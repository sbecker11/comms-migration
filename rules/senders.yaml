# Destination rule (Layer 2) — which hub does this sender belong on?
# Fill in during Phase 0/4. Python classifier loads this in Phase 5.
# Match order: exact email → phone → domain (longest match wins) → default

professional:
  domains:
    - spexture.com
    # - clientcorp.com
  emails:
    # - recruiter@agency.com
  phones:
    # - "+18015551234"

personal:
  domains:
    # - familydomain.com
  emails:
    # - cousin@example.com
  phones:
    # - "+18015559876"

# Edge cases — override domain-level defaults
overrides:
  # Personal shopping receipts on a business-looking domain
  # - match: { domain: amazon.com }
  #   hub: personal
  #   note: personal shopping receipts
  # Business tooling on a consumer domain
  # - match: { domain: aws.amazon.com }
  #   hub: professional
  #   note: business AWS invoices

default: personal  # unknown → personal hub + flag for review
